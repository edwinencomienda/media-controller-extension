<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 14px;
      text-align: center;
      color: #fff;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #333;
      outline: none;
    }

    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6c63ff;
      cursor: pointer;
    }

    #volume-value {
      min-width: 36px;
      text-align: right;
      font-size: 14px;
      font-weight: 600;
      color: #6c63ff;
    }

    .label {
      font-size: 12px;
      color: #aaa;
      margin: 12px 0 6px;
    }

    .label:first-of-type {
      margin-top: 0;
    }

    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 6px 0;
      border: none;
      border-radius: 4px;
      background: #6c63ff;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .reset-btn:hover {
      background: #5a52d5;
    }

    .shortcut-hint {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 8px;
      font-size: 11px;
      color: #777;
    }

    .shortcut-hint kbd {
      display: inline-block;
      padding: 1px 5px;
      border: 1px solid #555;
      border-radius: 3px;
      background: #2a2a3e;
      color: #bbb;
      font-family: inherit;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h3>Media Controller</h3>
  <div class="label">Volume</div>
  <div class="slider-container">
    <input type="range" id="volume-slider" min="0" max="100" value="100">
    <span id="volume-value">100%</span>
  </div>
  <button id="reset-volume-btn" class="reset-btn">Reset to 100%</button>
  <div class="label">Speed</div>
  <div class="slider-container">
    <input type="range" id="speed-slider" min="25" max="400" step="25" value="100">
    <span id="speed-value">1.00x</span>
  </div>
  <button id="reset-speed-btn" class="reset-btn">Reset to 1x</button>
  <div class="shortcut-hint">
    <span><kbd>S</kbd> slow down</span>
    <span><kbd>D</kbd> speed up</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
