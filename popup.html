<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      width: 280px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-icon {
      width: 18px;
      height: 18px;
      color: #6c63ff;
    }

    .header h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    /* Site Toggle Section */
    .site-toggle-section {
      background: rgba(108, 99, 255, 0.1);
      border: 1px solid rgba(108, 99, 255, 0.25);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .site-toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: #c0c0d0;
      min-width: 0;
      flex: 1;
    }

    .site-toggle-label .site-name {
      color: #fff;
      font-weight: 600;
      max-width: 75px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
      vertical-align: bottom;
    }

    /* Toggle Switch - Compact */
    .toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }

    .toggle input {
      display: none;
    }

    .toggle-slider {
      width: 36px;
      height: 20px;
      background: #4a4a5e;
      border-radius: 10px;
      position: relative;
      transition: all 0.2s ease;
    }

    .toggle-slider::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: all 0.2s ease;
    }

    .toggle input:checked + .toggle-slider {
      background: #6c63ff;
    }

    .toggle input:checked + .toggle-slider::after {
      transform: translateX(16px);
    }

    /* Control Sections - Compact */
    .control-section {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      transition: opacity 0.25s ease;
    }

    .control-section.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    .control-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .control-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #a0a0b0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .control-icon {
      width: 14px;
      height: 14px;
      color: #6c63ff;
    }

    .control-value {
      font-size: 13px;
      font-weight: 700;
      color: #6c63ff;
      min-width: 42px;
      text-align: right;
    }

    /* Slider - Compact */
    .slider-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: #3a3a4e;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #6c63ff;
      cursor: pointer;
    }

    /* Reset Button - Compact */
    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 6px 0;
      border: none;
      border-radius: 6px;
      background: rgba(108, 99, 255, 0.15);
      color: #b8b0ff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .reset-btn:hover {
      background: rgba(108, 99, 255, 0.25);
      color: #fff;
    }

    /* Speed Options Row */
    .speed-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .speed-option-label {
      font-size: 11px;
      color: #808090;
    }

    .speed-toggle-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .speed-toggle-text {
      font-size: 10px;
      color: #606070;
    }

    /* Section Shortcuts - Inside each control section */
    .section-shortcut {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .section-shortcut-label {
      font-size: 10px;
      color: #707080;
      font-weight: 500;
    }

    .section-shortcut-keys {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 18px;
      padding: 0 4px;
      border: 1px solid rgba(108, 99, 255, 0.3);
      border-radius: 3px;
      background: rgba(108, 99, 255, 0.1);
      color: #c8c0ff;
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
    }

    .shortcut-dash {
      color: #505060;
      font-size: 10px;
      font-weight: 500;
    }

    /* Suppress shortcuts section */
    .suppress-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .suppress-label {
      font-size: 11px;
      color: #808090;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
    </svg>
    <h3>Media Controller</h3>
  </div>

  <!-- Site Enable/Disable Toggle -->
  <div class="site-toggle-section">
    <div class="site-toggle-label">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #6c63ff;">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="2" y1="12" x2="22" y2="12"></line>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
      </svg>
      <span>Enable on <span class="site-name" id="current-site">this site</span></span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="site-enabled" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

    <!-- Volume Control -->
  <div class="control-section" id="volume-section">
    <div class="control-header">
      <div class="control-label">
        <svg class="control-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        Volume
      </div>
      <span class="control-value" id="volume-value">100%</span>
    </div>
    <div class="slider-container">
      <input type="range" id="volume-slider" min="0" max="100" value="100">
    </div>
    <button id="reset-volume-btn" class="reset-btn">Reset</button>
    <div class="section-shortcut">
      <span class="section-shortcut-label">Keys</span>
      <div class="section-shortcut-keys">
        <kbd>W</kbd>
        <span class="shortcut-dash">-</span>
        <kbd>E</kbd>
      </div>
    </div>
  </div>

    <!-- Speed Control -->
  <div class="control-section" id="speed-section">
    <div class="control-header">
      <div class="control-label">
        <svg class="control-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        Speed
      </div>
      <span class="control-value" id="speed-value">1.00x</span>
    </div>
    <div class="slider-container">
      <input type="range" id="speed-slider" min="25" max="400" step="25" value="100">
    </div>
    <button id="reset-speed-btn" class="reset-btn">Reset</button>
    
    <div class="speed-options">
      <span class="speed-option-label">Apply to all videos</span>
      <div class="speed-toggle-group">
        <label class="toggle">
          <input type="checkbox" id="speed-apply-all" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
    
    <div class="section-shortcut">
      <span class="section-shortcut-label">Keys</span>
      <div class="section-shortcut-keys">
        <kbd>S</kbd>
        <span class="shortcut-dash">-</span>
        <kbd>D</kbd>
      </div>
    </div>
  </div>

  <!-- Block Site Shortcuts Toggle -->
  <div class="suppress-section">
    <span class="suppress-label">Block conflicting site shortcuts</span>
    <label class="toggle">
      <input type="checkbox" id="suppress-site-shortcuts" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
