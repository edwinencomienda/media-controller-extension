<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 14px;
      text-align: center;
      color: #fff;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #333;
      outline: none;
    }

    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6c63ff;
      cursor: pointer;
    }

    #volume-value {
      min-width: 36px;
      text-align: right;
      font-size: 14px;
      font-weight: 600;
      color: #6c63ff;
    }
  </style>
</head>
<body>
  <h3>Volume Controller</h3>
  <div class="slider-container">
    <input type="range" id="volume-slider" min="0" max="100" value="100">
    <span id="volume-value">100%</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
